<div class="sucursal-container">

    <h1>Registro de Sucursal</h1>

    <form>

        <label>Nombre de la Sucursal</label>
        <input type="text" placeholder="Sucursal Central">

        <label>Dirección</label>
        <textarea rows="3"></textarea>

        <label>Teléfono</label>
        <input type="text" placeholder="2222-2222">

        <label>Correo Electrónico</label>
        <input type="email" placeholder="sucursal@enviafacil.com">

        <label>Estado de la Sucursal</label>
        <select>
            <option>Operando</option>
            <option>Pendiente de Apertura</option>
            <option>Fuera de Servicio</option>
        </select>

        <button type="submit">
            Guardar Sucursal
        </button>

    </form>

    <br>

    <a href="/inicio" class="btn-volver">
        Volver al Menú Principal
    </a>

</div>
